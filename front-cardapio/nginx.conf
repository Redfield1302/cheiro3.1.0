server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Resolver necessário pra proxy_pass com hostname/https
  resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;

  # Proxy API
  location /api/ {
    proxy_pass https://api.brisadocheff.site;
    proxy_ssl_server_name on;

    proxy_http_version 1.1;
    proxy_set_header Host api.brisadocheff.site;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # (Opcional) health local que bate na API
  location = /health {
    proxy_pass https://api.brisadocheff.site/health;
    proxy_ssl_server_name on;

    proxy_http_version 1.1;
    proxy_set_header Host api.brisadocheff.site;
  }
}
