server {
  listen 80;
  server_name _;

  # Pasta do build do Vite
  root /usr/share/nginx/html;
  index index.html;

  # ============ API PROXY ============
  # DNS resolver é necessário quando proxy_pass usa hostname e/ou HTTPS
  resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;

  # Proxy para /api/*
  location /api/ {
    proxy_pass https://api.brisadocheff.site;
    proxy_ssl_server_name on;

    proxy_http_version 1.1;
    proxy_set_header Host api.brisadocheff.site;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Opcional: timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # Proxy para /health
  location = /health {
    proxy_pass https://api.brisadocheff.site/health;
    proxy_ssl_server_name on;

    proxy_http_version 1.1;
    proxy_set_header Host api.brisadocheff.site;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
  }

  # ============ FRONT (SPA) ============
  # Cache leve para assets do Vite (opcional)
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  # Fallback do React Router
  location / {
    try_files $uri $uri/ /index.html;
  }
}
