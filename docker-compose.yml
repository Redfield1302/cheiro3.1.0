services:
  db:
    image: postgres:16-alpine
    container_name: cheiro3-db
    environment:
      POSTGRES_DB: cheiro3
      POSTGRES_USER: cheiro3
      POSTGRES_PASSWORD: cheiro3
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cheiro3 -d cheiro3"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    profiles: ["prod"]
    build:
      context: ./api
    container_name: cheiro3-api
    environment:
      DATABASE_URL: postgresql://cheiro3:cheiro3@db:5432/cheiro3?schema=public
      JWT_SECRET: dev-secret
      PORT: 3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  erp:
    profiles: ["prod"]
    build:
      context: ./front-pdr-erp
    container_name: cheiro3-erp
    depends_on:
      - api
    ports:
      - "8080:80"

  cardapio:
    profiles: ["prod"]
    build:
      context: ./front-cardapio
    container_name: cheiro3-cardapio
    depends_on:
      - api
    ports:
      - "8081:80"

  api-dev:
    profiles: ["dev"]
    image: node:20-alpine
    container_name: cheiro3-api-dev
    working_dir: /app
    volumes:
      - ./api:/app
    environment:
      DATABASE_URL: postgresql://cheiro3:cheiro3@db:5432/cheiro3?schema=public
      JWT_SECRET: dev-secret
      PORT: 3000
      NODE_ENV: development
    command: sh -c "npm install && npx prisma migrate deploy && npm run dev"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  erp-dev:
    profiles: ["dev"]
    image: node:20-alpine
    container_name: cheiro3-erp-dev
    working_dir: /app
    volumes:
      - ./front-pdr-erp:/app
    environment:
      VITE_API_PROXY_TARGET: http://api-dev:3000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - api-dev
    ports:
      - "5173:5173"

  cardapio-dev:
    profiles: ["dev"]
    image: node:20-alpine
    container_name: cheiro3-cardapio-dev
    working_dir: /app
    volumes:
      - ./front-cardapio:/app
    environment:
      VITE_API_PROXY_TARGET: http://api-dev:3000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    depends_on:
      - api-dev
    ports:
      - "5174:5174"

volumes:
  postgres_data:
